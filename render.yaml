# Blueprint Render — version GRATUITE (sans carte bancaire).
# ⚠️ Le plan gratuit n'a pas de disque persistant : les comptes clients et les
#    ventes sont réinitialisés à chaque redémarrage. Parfait pour VOIR le site
#    en ligne et tout tester. Pour de vrais clients payants, repasser en
#    plan "starter" + disque (voir DEPLOY.md).
services:
  - type: web
    name: scriba
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Secret de session généré automatiquement (stable et fort).
      - key: JWT_SECRET
        generateValue: true
      # À renseigner dans le dashboard Render — NON versionnés :
      - key: GROQ_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
