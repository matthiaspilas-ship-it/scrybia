# Blueprint Render — déploiement automatique du site.
# Sur Render : New + → "Blueprint" → connecte ce dépôt GitHub.
services:
  - type: web
    name: scriba
    runtime: node
    plan: starter # nécessaire pour le disque persistant (le plan gratuit n'en a pas)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    # Disque persistant : conserve comptes clients et ventes entre les déploiements.
    disk:
      name: scriba-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      # Secret de session : généré automatiquement par Render (stable et fort).
      - key: JWT_SECRET
        generateValue: true
      # À renseigner dans le dashboard Render (Environment) — NON versionnés :
      - key: GROQ_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
